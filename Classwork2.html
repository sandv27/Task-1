<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
       table th,tr,td {
            border: 2px solid black;
            border-collapse: collapse;
        
        }
        table{
            width: 50%;
            margin: 25%;
            text-align: center;
        }

        .colour{
            background-color: blue;
        }

        .background{
            background-color: blue;
        }

        tr,td,th{
            padding: 2%;
        }

    </style>
</head>
<body>
    <table>
        <tr class="colour">
            <th>Name</th>
            <th>Age</th>
            <th>Grade</th>
        </tr>
        <tr>
            <td>Sandeep</td>
            <td>46</td>
            <td>A</td>
        </tr>
        <tr class="background">
            <td>Nandini</td>
            <td>12</td>
            <td>A</td>
        </tr>
    </table>
</body>
</html>
