<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <style>
            /* table,td,tr{
                padding: 1%;
            } */


        </style>
</head>
<body>
    <table class="table">
        <tr>
            <td>Name</td>
            <td><input class="form-control" type="text" placeholder="Enter Name" aria-label="default input example"></td>
        </tr>

        <tr>
            <td>District</td>
            <td><select class="form-select" aria-label="Default select example">
                <option selected>Open this select menu</option>
                <option value="1">One</option>
                <option value="2">Two</option>
                <option value="3">Three</option>
            </select></td>
        </tr>
        <tr>
            <td>Address</td>
            <td>
            <span class="input-group-text">With textarea</span>
            <textarea class="form-control" aria-label="With textarea"></textarea>
            </td>

        </tr>

        <tr>
            <td></td>
            <td>
                <button type="button" class="btn btn-secondary" style="margin-left: 5%;">Submit</button>
                <button type="button" class="btn btn-success" style="margin-left: 5%;">Cancel</button>

            </td>
        </tr>
    </table>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
</body>
</html>
