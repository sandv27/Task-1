<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"> 
    <style>
        .TextArea{
            width: 400px;
            height: 200px;
        }
        .buttonstyle{
            margin-left: 50%;
        }
    </style>   
</head>
<body>

<table class="table">
    <tr>
        <td>Name</td>
        <td><input class="form-control" type="text" placeholder="Enter Name" aria-label="default input example"></td>
    </tr>

    <tr>
        <td>District</td>
        <td><select class="form-select" aria-label="Choose district">
            <option selected>Open this select menu</option>
            <option value="1">Ernakulam</option>
            <option value="2">Thrissur</option>
            <option value="3">Palakkad</option>
        </select>
        </td>
    </tr>

    <tr>
        <td>Gender</td>
        <td>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
                <label class="form-check-label" for="radioDefault1">
                    Male
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault2" checked>
                <label class="form-check-label" for="radioDefault2">
                    Female
                </label>
            </div>
        </td>
    </tr>

    <tr>
        <td>Address</td>
        <td><div class="input-group TextArea">
            <span class="input-group-text">Enter Address</span>
            <textarea class="form-control" aria-label="With textarea"></textarea>
        </div>
        </td>
    </tr>
    <tr>
        <td><button type="button" class="btn btn-success buttonstyle">Submit</button></td>
        <td><button type="button" class="btn btn-danger">Cancel</button></td>
        
    </tr>

</table>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
