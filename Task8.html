<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        table,tr,td{
            border: 2px solid black;
        }
        table{
            border-collapse: collapse;
        }
        table{
            width: 50%;
            height: 100%;
            text-align: center;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td rowspan="2">Task</td>
            <td colspan="7">Days of the Week</td>
           
        </tr>
        <tr>
            
            <td>Mon</td>
            <td>Tue</td>
            <td>Wed</td>
            <td>Thu</td>
            <td>Fri</td>
            <td>Sat</td>
            <td>Sun</td>
            
        </tr>
        <tr>
            <td>College</td>
            <td>Java</td>
            <td>Web Design</td>
            <td>C lang</td>
            <td>Python</td>
            <td>Practical</td>
            <td rowspan="2" colspan="2" style="padding: 2%;">Off</td>
            
        </tr>
        <tr>
            <td rowspan="2" style="padding: 2%;">Work</td>
            <td colspan="5" style="padding: 2%;">Subject preparation and project work</td>
            
            
        </tr>
        
    </table>
</body>
</html>
