<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
table tr{
    border: 2px solid black;
    background-color: black;
}

table{
    border-collapse: collapse;
}

table{
    height: 80%;
    width: 60%;
    
}

.Header{
    background-color: chocolate;
    color: yellowgreen;
    width: 60%;
}

td{
    color: yellowgreen;
    padding: 10px;
}

.Footer{
    background-color:chocolate;
    text-align: right;
    padding: 20%;
}


    </style>
</head>
<body>
    <form action="">
        <table>
            <tr class="Header">
                <td>Sign Up</td>
                <td></td>
            </tr>

            <tr>
                <td>First Name</td>
                <td align="left"><input type="text" placeholder="Enter First Name"></td>

            </tr>

            <tr>
                <td>Last Name</td>
                <td align="left"><input type="text" placeholder="Enter Last Name"></td>
            
            </tr>

            <tr>
    
                <td>Date of Birth</td>
                
                <td><select name="" id="">
                    <option value="">Date</option>
                </select>

                <select name="" id="">
                    <option value="">Month</option>
                </select>
            
                <select name="" id="">
                        <option value="">Year</option>
                    </select>
            </tr>

            <tr>
                <td>Gender</td>
                <td><input type="radio" name="Gender"> Male <input type="radio" name="Gender">Female</td>
            </tr>

            <tr>
                <td>Country</td>
                <td><select name="" id="">
                    <option value="">Country</option>
                </select></td>
            </tr>

            <tr>
                <td>Email</td>
                <td><input type="email" placeholder="Enter Email"></td>
            </tr>

            <tr>
                <td>Phone</td>
                <td><input type="number" placeholder="Enter Phone"></td>
            </tr>

            <tr>
                <td>Password</td>
                <td><input type="password"></td>
            </tr>

            <tr>
                <td>Confirm Password</td>
                <td><input type="password"></td>
            </tr>

            <tr>
                <td></td>
                <td><input type="checkbox">I Agree to the Terms of use</td>
            </tr>

            <tr class="Footer">
                <td></td>
                <td><button style="background-color: green;">Submit</button>         <button style="background-color:red;">Cancel</button></td>

        </table>

    </form>
</body>
</html>
