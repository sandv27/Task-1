<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table,tr,td{
            border: 2px solid black;

        }
        table,tr,td{
            border-collapse: collapse;

        }
        table{
            width: 50%;
            height: 30%;
            margin: 10%;
            text-align: center;
        }
        td{
            height: 40px;
        }
    </style>
</head>
<body>
    <form action="">
    <table>
        <tr>
            <td>Name</td>
            <td style="width: 80%;"><input type="text" placeholder="Enter Name" required></td>
        </tr>

        <tr>
            <th>Age</th>
            <td><input type="number" placeholder="Enter Age" required></td>
        </tr>

        <tr>
            <th>DOB</th>
            <td><input type="date" placeholder="Enter DOB"></td>
        </tr>

        <tr>
            <th>ID</th>
            <td><input type="file" placeholder="Attach ID"></td>
        </tr>

        <tr>
            <th>email</th>
            <td><input type="email" placeholder="Enter email" required></td>
        </tr>

        <tr>
            <th>Password</th>
            <td><input type="password" placeholder="Enter Password"></td>
        </tr>

        <tr>
            <th>District</th>
            <td><select name="" id="" required>
                <option value="">Select</option> 
                <option value="">Ernakulam</option>
                <option value="">Thrissur</option>
                <option value="">Palakkad</option>
             </select>
        
            </td>

        </tr>

        <tr>
            <th>Address</th>
            <td><textarea name="" id="" cols="30" rows="10"></textarea></td>
        </tr>

        <tr>
            <th>Gender</th>
            <td><input type="radio" name="Gender" >Male <input type="radio" name="Gender">Female</td>
        </tr>

        <tr>
            <th>Hobbies</th>
            <td><input type="checkbox">Painting <input type="checkbox">Handicraft</td>
            
        </tr>

        <tr>
            <td></td>
            <td><button>Submit</button> <button>Cancel</button></td>
        </tr>



    </table>

    </form>


    
</body>
</html>
